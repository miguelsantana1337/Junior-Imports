<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1677ff" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Painel offline — Junior Imports</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100dvh; margin: 0; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top, #102b52, #07101f 52%); color: #f5f8ff; }
      main { width: min(440px, 100%); padding: 34px; border: 1px solid #29496d; border-radius: 22px; background: rgb(9 25 45 / 92%); box-shadow: 0 24px 70px rgb(0 0 0 / 32%); text-align: center; }
      img { width: 72px; height: 72px; border-radius: 18px; }
      span { display: block; margin-top: 22px; color: #70a9f7; font-size: 11px; font-weight: 800; letter-spacing: .12em; }
      h1 { margin: 9px 0 12px; font-size: 30px; line-height: 1.05; }
      p { margin: 0; color: #a8b9cc; font-size: 14px; line-height: 1.6; }
      a { min-height: 46px; margin-top: 25px; display: inline-flex; align-items: center; justify-content: center; padding: 0 20px; border-radius: 11px; background: #1677ff; color: #fff; font-size: 14px; font-weight: 800; text-decoration: none; }
      small { display: block; margin-top: 18px; color: #71859e; font-size: 11px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <img src="/pwa/admin-icon-192.png" alt="" />
      <span>PAINEL DE CONTROLE</span>
      <h1>Você está sem conexão.</h1>
      <p>Reconecte-se para acessar pedidos, clientes, financeiro e demais informações atualizadas.</p>
      <a href="/admin">Tentar novamente</a>
      <small>Por segurança, os dados administrativos não ficam disponíveis offline.</small>
    </main>
  </body>
</html>
